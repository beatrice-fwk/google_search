<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            .advanced-form {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                background: #fff;
                padding: 32px 40px;
                border-radius: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.07);
                margin-bottom: 30px;
                min-width: 420px;
            }
            label {
                font-size: 16px;
                font-weight: 500;
                margin-bottom: 2px;
                display: block;
            }
            .input-row {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 20px;
                width: 100%;
            }
            .input-row label {
                min-width: 200px;
                margin-bottom: 0;
                font-weight: 400;
            }
            .input-row input[type="text"] {
                width: 350px;
                padding: 8px 16px;
                font-size: 15px;
                border-radius: 8px;
                border: 1px solid #ddd;
                margin-bottom: 0;
                text-align: left;
            }
            button[type="submit"] {
                padding: 10px 24px;
                font-size: 16px;
                border-radius: 4px;
                border: none;
                background: #1a73e8;
                color: #fff;
                font-weight: 500;
                cursor: pointer;
                align-self: flex-start;
                margin-top: 10px;
                transition: background-color 0.2s;
            }
            button[type="submit"]:hover {
                background: #1765c1;
            }
            .nav-links {
                position: absolute;
                top: 20px;
                right: 30px;
            }
            .nav-links a {
                margin-right: 10px;
            }
        </style>
    <body>
        <form action="https://www.google.com/search" method="get" class="advanced-form">
            <div class="input-row">
                <label for="as_q">All these words:</label>
                <input type="text" id="as_q" name="as_q">
            </div>
            <div class="input-row">
                <label for="as_epq">This exact word or phrase:</label>
                <input type="text" id="as_epq" name="as_epq">
            </div>
            <div class="input-row">
                <label for="as_oq">Any of these words:</label>
                <input type="text" id="as_oq" name="as_oq">
            </div>
            <div class="input-row">
                <label for="as_eq">None of these words:</label>
                <input type="text" id="as_eq" name="as_eq">
            </div>
            <button type="submit">Advanced Search</button>
        </form>
        <div class="nav-links">
            <a href="index.html">Google Search</a>
        </div>
    </body>
</html>
